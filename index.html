<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICT1</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 20px;
        }
        .container {
            background: white; padding: 30px; border-radius: 15px;
            max-width: 600px; width: 100%; box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        h1 { text-align: center; color: #1a73e8; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; margin-bottom: 15px; font-size: 16px; outline: none; }
        button {
            width: 100%; padding: 14px; background: #1a73e8; color: white;
            border: none; border-radius: 8px; font-size: 16px; font-weight: bold;
            cursor: pointer; transition: 0.3s;
        }
        button:hover { background: #1557b0; }
        button:disabled { background: #ccc; }
        .timer { text-align: right; color: #dc3545; font-weight: bold; margin-bottom: 15px; font-size: 18px; }
        .question { font-size: 18px; font-weight: 600; margin-bottom: 20px; padding: 15px; background: #f8f9fa; border-radius: 10px; line-height: 1.6; }
        .option {
            background: white; border: 2px solid #e9ecef; padding: 12px;
            margin: 8px 0; border-radius: 8px; cursor: pointer; transition: 0.2s;
        }
        .option:hover { border-color: #1a73e8; background: #f0f7ff; }
        .selected { background: #e8f0fe !important; border-color: #1a73e8 !important; }
        .hidden { display: none; }
        .result-box { background: #f8f9fa; padding: 20px; border-radius: 10px; text-align: center; margin: 20px 0; line-height: 1.8; }
        .score { font-size: 2.5em; color: #28a745; font-weight: bold; }
        .loading { text-align: center; padding: 20px; color: #666; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div id="loginPage">
        <h1>📚 ICT Quiz Day</h1>
        <input type="text" id="studentName" placeholder="আপনার নাম লিখুন">
        <input type="text" id="studentPhone" placeholder="WhatsApp নম্বর">
        <button id="startBtn" onclick="startQuiz()">📝 পরীক্ষা শুরু করুন</button>
        <div id="loadingMsg" class="loading hidden">⏳ প্রশ্ন লোড হচ্ছে... অনুগ্রহ করে অপেক্ষা করুন।</div>
    </div>

    <div id="quizPage" class="hidden">
        <div class="timer">⏱️ সময়: <span id="timeLeft">30</span> সে.</div>
        <div class="question" id="questionText"></div>
        <div id="optionsList"></div>
        <button onclick="nextQuestion()" style="margin-top: 15px;">➡ পরবর্তী প্রশ্ন</button>
        <div style="text-align: center; margin-top: 15px; color: #666;">
            প্রশ্ন <span id="currentQ">0</span> / <span id="totalQ">0</span>
        </div>
    </div>

    <div id="resultPage" class="hidden">
        <h1>🎉 ফলাফল</h1>
        <div class="result-box" id="resultBox"></div>
        <button onclick="location.reload()">🔄 নতুন পরীক্ষা</button>
    </div>
</div>

<script>
    // আপনার লিঙ্কগুলো এখানে আপডেট করা হয়েছে
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRz139u6UTqfYp_H_IERxQVMwfcVCNp8ChVdZFV4S-RD1D3p6fQT7iV38BtQ9NSJGeWMkbWYOSQtrW5/pub?gid=1317046795&single=true&output=csv";
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxyHNFMm3xFw8XBnISvkBhkzFUH5nFD1rkPz9KwM_9m0wg2J1FeTt5ugSMLnv_zYEiR/exec";

    let questions = [];
    let currentIndex = 0;
    let userScore = 0;
    let selectedAnswer = null;
    let timeLeft = 30;
    let timerInterval = null;
    let studentName = "";
    let studentPhone = "";

    function parseCSV(text) {
        const rows = [];
        const lines = text.split(/\r?\n/);
        for (let line of lines) {
            const cols = [];
            let current = '';
            let inQuotes = false;
            for (let char of line) {
                if (char === '"') inQuotes = !inQuotes;
                else if (char === ',' && !inQuotes) {
                    cols.push(current.trim());
                    current = '';
                } else {
                    current += char;
                }
            }
            cols.push(current.trim());
            if (cols[0]) rows.push(cols);
        }
        return rows;
    }

    async function startQuiz() {
        studentName = document.getElementById('studentName').value.trim();
        studentPhone = document.getElementById('studentPhone').value.trim();

        if (!studentName || !studentPhone) {
            alert("❌ অনুগ্রহ করে নাম এবং WhatsApp নম্বর দিন!");
            return;
        }

        const loadingMsg = document.getElementById('loadingMsg');
        const startBtn = document.getElementById('startBtn');
        loadingMsg.classList.remove('hidden');
        startBtn.disabled = true;

        try {
            const response = await fetch(CSV_URL + "&t=" + Date.now());
            const data = await response.text();
            const rows = parseCSV(data);

            questions = [];
            for (let i = 1; i < rows.length; i++) {
                const row = rows[i];
                if (row.length >= 6) {
                    questions.push({
                        text: row[0].replace(/^"|"$/g, ''),
                        a: row[1].replace(/^"|"$/g, ''),
                        b: row[2].replace(/^"|"$/g, ''),
                        c: row[3].replace(/^"|"$/g, ''),
                        d: row[4].replace(/^"|"$/g, ''),
                        correct: row[5].replace(/^"|"$/g, '').toLowerCase().trim()
                    });
                }
            }

            if (questions.length === 0) throw new Error("প্রশ্ন লোড করা সম্ভব হয়নি।");

            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('quizPage').classList.remove('hidden');
            document.getElementById('totalQ').innerText = questions.length;
            loadQuestion();

        } catch (error) {
            alert("ভুল: " + error.message);
            loadingMsg.classList.add('hidden');
            startBtn.disabled = false;
        }
    }

    function loadQuestion() {
        if (currentIndex >= questions.length) {
            endQuiz();
            return;
        }

        selectedAnswer = null;
        timeLeft = 30;
        document.getElementById('timeLeft').innerText = timeLeft;

        const q = questions[currentIndex];
        document.getElementById('questionText').innerText = (currentIndex + 1) + ". " + q.text;
        document.getElementById('optionsList').innerHTML = `
            <div class="option" onclick="selectOpt('a', this)">A) ${q.a}</div>
            <div class="option" onclick="selectOpt('b', this)">B) ${q.b}</div>
            <div class="option" onclick="selectOpt('c', this)">C) ${q.c}</div>
            <div class="option" onclick="selectOpt('d', this)">D) ${q.d}</div>
        `;
        document.getElementById('currentQ').innerText = currentIndex + 1;

        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('timeLeft').innerText = timeLeft;
            if (timeLeft <= 0) nextQuestion();
        }, 1000);
    }

    function selectOpt(ans, el) {
        selectedAnswer = ans;
        document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
        el.classList.add('selected');
    }

    function nextQuestion() {
        if (selectedAnswer === questions[currentIndex].correct) {
            userScore++;
        }
        currentIndex++;
        loadQuestion();
    }

    function endQuiz() {
        clearInterval(timerInterval);
        document.getElementById('quizPage').classList.add('hidden');
        document.getElementById('resultPage').classList.remove('hidden');

        const percent = ((userScore / questions.length) * 100).toFixed(2);
        document.getElementById('resultBox').innerHTML = `
            <p><strong>নাম:</strong> ${studentName}</p>
            <p><strong>WhatsApp:</strong> ${studentPhone}</p>
            <p><strong>সঠিক উত্তর:</strong> ${userScore} / ${questions.length}</p>
            <p><strong>স্কোর:</strong> <span class="score">${percent}%</span></p>
        `;

        // Apps Script এ রেজাল্ট সেভ করার রিকোয়েস্ট
        fetch(SCRIPT_URL, {
            method: "POST",
            mode: "no-cors",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                name: studentName,
                phone: studentPhone,
                score: userScore,
                total: questions.length
            })
        });
    }
</script>
</body>
</html>

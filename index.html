<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICT Quiz - Day</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background: #1a1a2e; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; color: #fff; }
        .container { background: #16213e; padding: 30px; border-radius: 15px; max-width: 500px; width: 100%; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; position: relative; }
        h1 { margin-bottom: 20px; color: #4ecca3; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: none; font-size: 16px; outline: none; }
        button { width: 100%; padding: 15px; background: #4ecca3; color: #1a1a2e; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        button:hover { background: #45b393; transform: translateY(-2px); }
        .hidden { display: none; }
        .timer { font-size: 20px; color: #e94560; margin-bottom: 15px; font-weight: bold; }
        .question { background: #0f3460; padding: 20px; border-radius: 10px; margin-bottom: 20px; font-size: 18px; text-align: left; line-height: 1.5; }
        .option { background: #fff; color: #1a1a2e; padding: 12px; margin: 10px 0; border-radius: 8px; cursor: pointer; text-align: left; transition: 0.2s; border: 2px solid transparent; }
        .option:hover { border-color: #4ecca3; background: #f0fdf4; }
        .selected { background: #4ecca3 !important; color: #fff !important; }
        
        /* Loading Animation CSS */
        .loader { border: 5px solid #f3f3f3; border-top: 5px solid #4ecca3; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .status-msg { color: #4ecca3; font-weight: bold; margin-top: 10px; }
        .success-icon { font-size: 50px; color: #4ecca3; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div id="loginPage">
        <h1>🎓 ICT Quiz Day</h1>
        <input type="text" id="studentName" placeholder="আপনার নাম">
        <input type="text" id="studentPhone" placeholder="WhatsApp নম্বর">
        <button onclick="startQuiz()">📝 পরীক্ষা শুরু করুন</button>
    </div>

    <div id="quizPage" class="hidden">
        <div class="timer">⏱️ সময়: <span id="timeLeft">30</span> সে.</div>
        <div class="question" id="questionText"></div>
        <div id="optionsList"></div>
        <button onclick="nextQuestion()">পরবর্তী প্রশ্ন ➡</button>
    </div>

    <div id="loadingPage" class="hidden">
        <div class="loader"></div>
        <p class="status-msg">আপনার রেজাল্ট সেভ হচ্ছে... অনুগ্রহ করে অপেক্ষা করুন।</p>
    </div>

    <div id="resultPage" class="hidden">
        <div class="success-icon">✅</div>
        <h2 style="color: #4ecca3; margin-bottom: 15px;">Result Saved Successfully!</h2>
        <div id="resultBox" style="font-size: 18px; line-height: 2; background: #0f3460; padding: 20px; border-radius: 10px; margin-bottom: 20px;"></div>
        <button onclick="location.reload()">🔄 আবার পরীক্ষা দিন</button>
    </div>
</div>

<script>
    // আপনার পাবলিশ করা প্রশ্ন শিটের CSV লিঙ্ক
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRz139u6UTqfYp_H_IERxQVMwfcVCNp8ChVdZFV4S-RD1D3p6fQT7iV38BtQ9NSJGeWMkbWYOSQtrW5/pub?gid=1317046795&single=true&output=csv";
    
    // আপনার সর্বশেষ Web App URL
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyRnZMe0kEJDL7wlu9i4hmPc9as-7YW3eVP9OvdTwLeCNkfkmRWl0B0TvuJ7XfC2CfQ/exec";

    let questions = [];
    let currentIndex = 0;
    let userScore = 0;
    let selectedAnswer = null;
    let timeLeft = 30;
    let timerInterval = null;
    let studentName = "";
    let studentPhone = "";

    async function startQuiz() {
        studentName = document.getElementById('studentName').value.trim();
        studentPhone = document.getElementById('studentPhone').value.trim();

        if (!studentName || !studentPhone) {
            alert("❌ নাম এবং মোবাইল নম্বর দিন!");
            return;
        }

        try {
            const response = await fetch(CSV_URL);
            const data = await response.text();
            const rows = data.split(/\r?\n/).map(row => row.split(','));
            
            questions = [];
            // শিটের কলাম অনুযায়ী প্রশ্ন লোড করা
            for(let i=1; i<rows.length; i++) {
                if(rows[i][0]) {
                    questions.push({
                        q: rows[i][0].replace(/"/g, ""), // Question
                        a: rows[i][1].replace(/"/g, ""), // OptionA
                        b: rows[i][2].replace(/"/g, ""), // OptionB
                        c: rows[i][3].replace(/"/g, ""), // OptionC
                        d: rows[i][4].replace(/"/g, ""), // OptionD
                        ans: rows[i][5].replace(/"/g, "").toLowerCase().trim() // Correct Answer
                    });
                }
            }

            if(questions.length === 0) {
                alert("⚠️ কোনো প্রশ্ন পাওয়া যায়নি!");
                return;
            }

            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('quizPage').classList.remove('hidden');
            loadQuestion();
        } catch (e) {
            alert("⚠️ প্রশ্ন লোড করা যায়নি! ইন্টারনেট চেক করুন।");
        }
    }

    function loadQuestion() {
        if (currentIndex >= questions.length) {
            submitResult();
            return;
        }
        selectedAnswer = null;
        timeLeft = 30;
        document.getElementById('timeLeft').innerText = timeLeft;
        
        const q = questions[currentIndex];
        document.getElementById('questionText').innerText = (currentIndex+1) + ". " + q.q;
        document.getElementById('optionsList').innerHTML = `
            <div class="option" onclick="selectOpt('a', this)">A. ${q.a}</div>
            <div class="option" onclick="selectOpt('b', this)">B. ${q.b}</div>
            <div class="option" onclick="selectOpt('c', this)">C. ${q.c}</div>
            <div class="option" onclick="selectOpt('d', this)">D. ${q.d}</div>
        `;

        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('timeLeft').innerText = timeLeft;
            if(timeLeft <= 0) nextQuestion();
        }, 1000);
    }

    function selectOpt(ans, el) {
        selectedAnswer = ans;
        document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
        el.classList.add('selected');
    }

    function nextQuestion() {
        if(selectedAnswer === questions[currentIndex].ans) userScore++;
        currentIndex++;
        loadQuestion();
    }

    async function submitResult() {
        clearInterval(timerInterval);
        document.getElementById('quizPage').classList.add('hidden');
        document.getElementById('loadingPage').classList.remove('hidden');

        const per = ((userScore / questions.length) * 100).toFixed(2);
        
        try {
            // গুগল শিটে ডাটা পাঠানো
            await fetch(SCRIPT_URL, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify({
                    name: studentName,
                    phone: studentPhone,
                    score: userScore,
                    total: questions.length
                })
            });

            // অ্যানিমেশন দেখানোর জন্য সামান্য বিরতি
            setTimeout(() => {
                document.getElementById('loadingPage').classList.add('hidden');
                document.getElementById('resultPage').classList.remove('hidden');
                
                document.getElementById('resultBox').innerHTML = `
                    <p><strong>নাম:</strong> ${studentName}</p>
                    <p><strong>সঠিক উত্তর:</strong> ${userScore} / ${questions.length}</p>
                    <p><strong>স্কোর:</strong> ${per}%</p>
                `;
            }, 2500);

        } catch (error) {
            document.getElementById('loadingPage').innerHTML = "<p style='color:red'>সেভ করতে সমস্যা হয়েছে।</p>";
        }
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICT Quiz Day</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        h1 { text-align: center; color: #1a73e8; }
        input, button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        button {
            background: #1a73e8;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background: #1557b0; }
        .option {
            background: #f8f9fa;
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid #e9ecef;
        }
        .option:hover { border-color: #1a73e8; }
        .selected { background: #e8f0fe; border-color: #1a73e8; }
        .timer { text-align: right; color: red; font-weight: bold; margin-bottom: 10px; }
        .hidden { display: none; }
        .result-box { text-align: center; padding: 20px; background: #f8f9fa; border-radius: 10px; margin-top: 20px; }
        .score { font-size: 2em; color: #28a745; font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <div id="login">
        <h1>📚 ICT Quiz Day</h1>
        <input type="text" id="name" placeholder="আপনার নাম">
        <input type="text" id="phone" placeholder="WhatsApp নম্বর">
        <button onclick="startExam()">পরীক্ষা শুরু করুন</button>
        <div id="loading" style="display:none; text-align:center;">⏳ প্রশ্ন লোড হচ্ছে...</div>
    </div>
    
    <div id="exam" class="hidden">
        <div class="timer">⏱️ সময়: <span id="timer">30</span> সেকেন্ড</div>
        <div id="question"></div>
        <div id="options"></div>
        <button onclick="nextQuestion()">পরবর্তী প্রশ্ন</button>
        <p style="text-align:center; margin-top:10px;">প্রশ্ন <span id="current">0</span>/<span id="total">0</span></p>
    </div>
    
    <div id="result" class="hidden">
        <h1>🎉 ফলাফল</h1>
        <div class="result-box" id="resultBox"></div>
        <button onclick="location.reload()">নতুন পরীক্ষা</button>
    </div>
</div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/1waS14PcKzr9lK4Cvvq3zTbEo6hNAT9oNWTOPiWgvxAI/export?format=csv&gid=1317046795";

let questions = [];
let current = 0;
let score = 0;
let selected = null;
let timer = null;
let timeLeft = 30;
let userName = "";
let userPhone = "";

async function startExam() {
    userName = document.getElementById('name').value.trim();
    userPhone = document.getElementById('phone').value.trim();
    
    if(!userName || !userPhone) {
        alert("নাম এবং নম্বর দিন!");
        return;
    }
    
    document.getElementById('loading').style.display = 'block';
    document.querySelector('#login button').disabled = true;
    
    try {
        const response = await fetch(CSV_URL + '?t=' + Date.now());
        const csv = await response.text();
        
        const lines = csv.split('\n').filter(l => l.trim());
        questions = [];
        
        for(let i = 1; i < lines.length; i++) {
            const cols = lines[i].split(',');
            if(cols.length >= 6 && cols[0].trim()) {
                questions.push({
                    text: cols[0].replace(/^"|"$/g, '').trim(),
                    a: cols[1].replace(/^"|"$/g, '').trim(),
                    b: cols[2].replace(/^"|"$/g, '').trim(),
                    c: cols[3].replace(/^"|"$/g, '').trim(),
                    d: cols[4].replace(/^"|"$/g, '').trim(),
                    correct: cols[5].replace(/^"|"$/g, '').trim().toLowerCase()
                });
            }
        }
        
        if(questions.length === 0) throw new Error("কোন প্রশ্ন নেই");
        
        document.getElementById('login').classList.add('hidden');
        document.getElementById('exam').classList.remove('hidden');
        document.getElementById('total').innerText = questions.length;
        
        loadQuestion();
        
    } catch(e) {
        alert("প্রশ্ন লোড হয়নি!\n" + e.message);
        document.getElementById('loading').style.display = 'none';
        document.querySelector('#login button').disabled = false;
    }
}

function loadQuestion() {
    if(current >= questions.length) {
        endExam();
        return;
    }
    
    selected = null;
    timeLeft = 30;
    updateTimerDisplay();
    
    const q = questions[current];
    document.getElementById('question').innerHTML = `<strong>${current+1}. ${q.text}</strong>`;
    document.getElementById('options').innerHTML = `
        <div class="option" onclick="selectAnswer('a', this)">🔘 A) ${q.a}</div>
        <div class="option" onclick="selectAnswer('b', this)">🔘 B) ${q.b}</div>
        <div class="option" onclick="selectAnswer('c', this)">🔘 C) ${q.c}</div>
        <div class="option" onclick="selectAnswer('d', this)">🔘 D) ${q.d}</div>
    `;
    document.getElementById('current').innerText = current + 1;
    
    if(timer) clearInterval(timer);
    timer = setInterval(() => {
        timeLeft--;
        updateTimerDisplay();
        if(timeLeft <= 0) {
            clearInterval(timer);
            nextQuestion();
        }
    }, 1000);
}

function updateTimerDisplay() {
    document.getElementById('timer').innerText = timeLeft;
}

function selectAnswer(ans, el) {
    selected = ans;
    document.querySelectorAll('.option').forEach(opt => opt.classList.remove('selected'));
    el.classList.add('selected');
}

function nextQuestion() {
    if(selected && selected === questions[current].correct) {
        score++;
    }
    current++;
    loadQuestion();
}

function endExam() {
    clearInterval(timer);
    document.getElementById('exam').classList.add('hidden');
    document.getElementById('result').classList.remove('hidden');
    
    const percentage = (score / questions.length * 100).toFixed(2);
    document.getElementById('resultBox').innerHTML = `
        <p><strong>নাম:</strong> ${userName}</p>
        <p><strong>সঠিক উত্তর:</strong> ${score} / ${questions.length}</p>
        <p><strong>স্কোর:</strong> <span class="score">${percentage}%</span></p>
        <p><strong>ফোন:</strong> ${userPhone}</p>
    `;
}
</script>
</body>
</html>
